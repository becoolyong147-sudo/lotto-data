<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🐲 生肖推荐历史记录 2021-2026 · 万马多新豪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --color-primary: #0F172A;
  --color-on-primary: #FFFFFF;
  --color-secondary: #334155;
  --color-accent: #0369A1;
  --color-background: #F8FAFC;
  --color-foreground: #020617;
  --color-muted: #E8ECF1;
  --color-border: #E2E8F0;
  --color-destructive: #DC2626;
  --color-ring: #0F172A;
  --color-success: #16A34A;

  --font-heading: 'EB Garamond', serif;
  --font-body: 'Crimson Text', serif;

  --radius: 8px;
  --radius-lg: 12px;
  --shadow-sm: 0 1px 2px rgba(15,23,42,.08);
  --shadow-md: 0 4px 12px rgba(15,23,42,.12);
  --shadow-lg: 0 8px 24px rgba(15,23,42,.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--color-background);
  color: var(--color-foreground);
  font-size: 16px;
  line-height: 1.6;
}

/* ===== HEADER ===== */
header {
  background: linear-gradient(135deg, var(--color-primary) 0%, #1e293b 100%);
  color: var(--color-on-primary);
  padding: 60px 20px;
  text-align: center;
}

header h1 {
  font-family: var(--font-heading);
  font-size: 2.5rem;
  font-weight: 800;
  margin-bottom: 12px;
  letter-spacing: -1px;
}

header p {
  font-size: 1.1rem;
  opacity: 0.9;
  max-width: 600px;
  margin: 0 auto;
}

/* ===== MAIN CONTAINER ===== */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
}

/* ===== STATS SECTION ===== */
#stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 60px;
}

.stat-card {
  background: white;
  padding: 24px;
  border-radius: var(--radius-lg);
  text-align: center;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border);
  transition: all 0.3s ease;
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}

.stat-card .value {
  font-family: var(--font-heading);
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--color-primary);
  margin-bottom: 8px;
}

.stat-card .label {
  font-size: 0.95rem;
  color: var(--color-secondary);
  font-weight: 500;
}

/* ===== ZODIAC GRID ===== */
h2 {
  font-family: var(--font-heading);
  font-size: 2rem;
  color: var(--color-primary);
  margin-bottom: 30px;
  margin-top: 40px;
}

#zodiacGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 16px;
  margin-bottom: 60px;
}

.zodiac-card {
  background: white;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: var(--shadow-sm);
}

.zodiac-card:hover {
  transform: translateY(-8px) scale(1.05);
  box-shadow: var(--shadow-md);
  border-color: var(--color-accent);
}

.zodiac-emoji {
  font-size: 3rem;
  margin-bottom: 10px;
}

.zodiac-name {
  font-family: var(--font-heading);
  font-size: 1.1rem;
  color: var(--color-primary);
  margin-bottom: 12px;
  font-weight: 600;
}

.zodiac-stats {
  font-size: 0.85rem;
}

.zodiac-hits {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--color-accent);
  margin-bottom: 4px;
}

.zodiac-rate {
  color: var(--color-success);
  font-weight: 600;
  margin-top: 6px;
}

/* ===== TABLE ===== */
.ot {
  overflow-x: auto;
  margin-bottom: 40px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

th {
  background: linear-gradient(135deg, var(--color-primary) 0%, #1e293b 100%);
  color: white;
  padding: 16px;
  text-align: left;
  font-weight: 600;
  font-size: 0.95rem;
}

td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--color-border);
}

tr:last-child td {
  border-bottom: none;
}

tr:hover {
  background: #f8fafc;
}

.hit-yes {
  color: var(--color-success);
  font-weight: 600;
}

/* ===== LOADING ===== */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--color-secondary);
  font-size: 1.1rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  header h1 { font-size: 2rem; }
  #stats { grid-template-columns: 1fr 1fr; gap: 12px; }
  #zodiacGrid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .zodiac-card { padding: 12px; }
  .zodiac-emoji { font-size: 2rem; }
  main { padding: 20px 12px; }
}

@media (max-width: 480px) {
  header { padding: 30px 16px; }
  header h1 { font-size: 1.5rem; }
  header p { font-size: 0.95rem; }
  #stats { grid-template-columns: 1fr; gap: 10px; }
  .stat-card { padding: 16px; }
  .stat-card .value { font-size: 2rem; }
  #zodiacGrid { grid-template-columns: repeat(2, 1fr); }
  table { font-size: 0.85rem; }
  th, td { padding: 10px 8px; }
}
</style>
</head>

<script>
const ZODIACS = [
  { name: '鼠', emoji: '🐭', idx: 0 },
  { name: '牛', emoji: '🐮', idx: 1 },
  { name: '虎', emoji: '🐯', idx: 2 },
  { name: '兔', emoji: '🐰', idx: 3 },
  { name: '龙', emoji: '🐲', idx: 4 },
  { name: '蛇', emoji: '🐍', idx: 5 },
  { name: '马', emoji: '🐴', idx: 6 },
  { name: '羊', emoji: '🐑', idx: 7 },
  { name: '猴', emoji: '🐵', idx: 8 },
  { name: '鸡', emoji: '🐔', idx: 9 },
  { name: '狗', emoji: '🐶', idx: 10 },
  { name: '猪', emoji: '🐷', idx: 11 }
];

function getZodiacByNum(num) {
  const year = parseInt(num, 10);
  const zodiacIdx = ((year - 4) % 12 + 12) % 12;
  return zodiacIdx;
}

function loadData() {
  const status = document.getElementById('status');
  
  try {
    const lsData = JSON.parse(localStorage.getItem('lottery_new_results') || '{}');
    const market = Object.keys(lsData)[0] || '万能';
    const draws = (lsData[market] || []).filter(d => d.date >= '2026-04-01');

    if (!draws.length) {
      document.getElementById('zodiacGrid').innerHTML = '<div class="loading" style="grid-column: 1/-1;">暂无数据</div>';
      return;
    }

    const data = computeStats(draws);
    renderStats(data);
    renderZodiacCards(data);
    renderReplayTable(data);
  } catch(e) {
    console.error(e);
    document.getElementById('zodiacGrid').innerHTML = '<div class="loading" style="grid-column: 1/-1;">加载出错</div>';
  }
}

function computeStats(draws) {
  const zodiacStats = ZODIACS.map(z => ({
    ...z,
    hits: 0,
    total: 0,
    rate: 0
  }));

  let totalHits = 0;
  const hitZodiacSet = new Set();
  const monthData = {};

  draws.forEach(d => {
    const month = d.date.substring(0, 7);
    if (!monthData[month]) monthData[month] = { total: 0, hits: 0, zodiacSet: new Set() };
    monthData[month].total++;

    [0, 1, 2].forEach(prizeIdx => {
      const num = d.nums?.[prizeIdx];
      if (!num) return;

      const zodiacIdx = getZodiacByNum(num);
      zodiacStats[zodiacIdx].hits++;
      zodiacStats[zodiacIdx].total++;
      totalHits++;
      hitZodiacSet.add(zodiacIdx);
      monthData[month].hits++;
      monthData[month].zodiacSet.add(zodiacIdx);
    });
  });

  zodiacStats.forEach(z => {
    z.rate = z.total > 0 ? Math.round(z.hits / z.total * 100) : 0;
  });

  return {
    totalHits,
    overallRate: Math.round(totalHits / (draws.length * 3) * 100),
    zodiacStats,
    monthData,
    monthKeys: Object.keys(monthData).sort(),
    hitZodiacCount: hitZodiacSet.size
  };
}

function renderStats(data) {
  const html = `
    <div class="stat-card">
      <div class="value">${data.totalHits}</div>
      <div class="label">总命中次数</div>
    </div>
    <div class="stat-card">
      <div class="value">${data.overallRate}%</div>
      <div class="label">总命中率</div>
    </div>
    <div class="stat-card">
      <div class="value">${data.monthKeys.length}</div>
      <div class="label">参与月份</div>
    </div>
    <div class="stat-card">
      <div class="value">${data.hitZodiacCount}/12</div>
      <div class="label">命中生肖数</div>
    </div>
  `;
  document.getElementById('stats').innerHTML = html;
}

function renderZodiacCards(data) {
  const html = data.zodiacStats.map(z => `
    <div class="zodiac-card">
      <div class="zodiac-emoji">${z.emoji}</div>
      <div class="zodiac-name">${z.name}肖</div>
      <div class="zodiac-stats">
        <div class="zodiac-hits">${z.hits}</div>
        <div>命中 ${z.total} 次</div>
        <div class="zodiac-rate">${z.rate}%</div>
      </div>
    </div>
  `).join('');
  document.getElementById('zodiacGrid').innerHTML = html;
}

function renderReplayTable(data) {
  const rows = data.monthKeys.map(month => {
    const m = data.monthData[month];
    const rate = m.total > 0 ? Math.round(m.hits / m.total * 100) : 0;
    const zodiacNames = Array.from(m.zodiacSet).map(i => ZODIACS[i].name).join('、');
    return `
      <tr>
        <td>${month}</td>
        <td>${m.total}</td>
        <td class="hit-yes">${m.hits}</td>
        <td class="hit-yes">${rate}%</td>
        <td style="font-size: 13px;">${zodiacNames || '—'}</td>
      </tr>
    `;
  }).join('');

  document.getElementById('replayBody').innerHTML = rows || '<tr><td colspan="5" style="text-align: center; color: var(--color-secondary);">暂无数据</td></tr>';
}
